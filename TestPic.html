<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Birkenhead Rolling Wheels – Hagley Museum</title>

  <style>
    body {
      margin: 0;
      background-color: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Background environment */
    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(#cfe8ff, #ffffff);
    }

    /* Main exhibit image */
    .mill-image {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 85vh; /* controls "life-size" feel */
      max-width: 95vw;
      object-fit: contain;
    }

    /* Overlay text */
    .overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="background"></div>

  <!-- YOUR IMAGE -->
  <img src="https://ndavani.github.io/Hagley-test/Pic.png" class="mill-image">

  <div class="overlay">
    Birkenhead Rolling Wheels (Historical View)
  </div>

</div>

</body>
</html>
